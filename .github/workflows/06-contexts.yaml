name: 06 - Contexts
run-name: "06 - Contexts | DEBUG: ${{inputs.debug}}"
on:
    push:
        branches: [ main ]

    workflow_dispatch:
        inputs:
            debug:
                type: boolean
                default: false

env:
    MY_WORKFLOW_VAR: "workflow"
    MY_OVERWRITE_VAR: "workflow"                

jobs:
    echo-data:
        runs-on: ubuntu-latest
        env:
            MY_JOB_VAR: "job"
            MY_OVERWRITE_VAR: "job"
        steps:
            - name: Display Information
              run: |
                echo "Event name: ${{ github.event_name }}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
                echo "actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run number: ${{ github.run_number }}"

            - name: Retrieve Variable
              env:
                MY_OVERWRITE_VAR: "step"
              run: |
                echo "Variable Value: ${{ vars.MY_VARIABLE }}"
            
            - name: Print Environment Variables
              run: |
                echo "Workflow Variable: ${{ env.MY_WORKFLOW_VAR }}"
                echo "Job Variable: ${{ env.MY_JOB_VAR }}"
                echo "Overwritten Variable: ${{ env.MY_OVERWRITE_VAR }}"  